<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 进化实验室 (AI Evolution Lab)</title>

    <!-- 严格遵守加载顺序：Tailwind -> React -> ReactDOM -> Babel -> Lucide -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020617;
            --bg-medium: #0f172a;
            --bg-light: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent-cyan: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.15);
        }

        body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-medium) 50%, var(--bg-light) 100%);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* 极致清晰毛玻璃效果 - 第一版核心设计 */
        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(25px) saturate(1.8);
            -webkit-backdrop-filter: blur(25px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px 40px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            bottom: -2px;
            left: -2px;
            background: linear-gradient(135deg, var(--accent-cyan), transparent);
            border-radius: 22px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: var(--accent-cyan);
            box-shadow: 0 30px 60px -15px var(--accent-glow);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* 霓虹电光青效果 */
        .cyber-button {
            background: linear-gradient(135deg, var(--accent-cyan), #06b6d4);
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            color: var(--bg-deep);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px -5px var(--accent-cyan);
        }

        .cyber-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 30px -5px var(--accent-cyan), 0 0 20px var(--accent-glow);
        }

        .cyber-button:active {
            transform: translateY(0) scale(0.98);
        }

        /* 挑战引擎特殊样式 */
        .challenge-engine {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(34, 211, 238, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
        }

        .challenge-engine::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-cyan), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .challenge-engine:hover::before {
            opacity: 0.6;
        }

        /* 高级输入框 */
        .ai-textarea {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            width: 100%;
            color: var(--text-primary);
            min-height: 120px;
            resize: vertical;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .ai-textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* 进度条美化 */
        .progress-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent-cyan), #06b6d4);
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 霓虹呼吸灯效果 */
        @keyframes cyber-breath {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
                box-shadow: 0 0 20px var(--accent-cyan), 0 0 40px var(--accent-glow);
            }
        }

        .cyber-breath {
            animation: cyber-breath 2.5s ease-in-out infinite;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(34, 211, 238, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            transform: translateX(-2px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 全局错误捕获
        window.addEventListener('error', (e) => {
            console.error('Global error caught:', e);
            document.getElementById('root').innerHTML =
                '<div style="padding: 50px; text-align: center; font-size: 18px; color: #ef4444;">' +
                '⚠️ 系统加载异常，请刷新页面后重试' +
                '</div>';
        });

        // 使用React Hooks创建真实可用的组件
        const { useState, useEffect } = React;

        // 主场页面组件
        const HomePage = ({ startChallenge }) => {
            const [isTransitioning, setIsTransitioning] = useState(false);

            const handleStart = () => {
                setIsTransitioning(true);
                setTimeout(() => {
                    startChallenge();
                }, 400);
            };

            return (
                <div className={`min-h-screen flex flex-col justify-center items-center transition-all duration-500 ${isTransitioning ? 'opacity-0 scale-95' : 'opacity-100 scale-100'}`}>
                    <div className="max-w-5xl mx-auto text-center px-6">
                        <h1 className="text-7xl md:text-8xl font-light mb-8">
                            <span className="bg-gradient-to-r from-white via-cyan-300 to-cyan-400 bg-clip-text text-transparent">AI</span>
                            <span className="text-white ml-3">进化实验室</span>
                        </h1>
                        <p className="text-xl text-gray-400 mb-12 leading-relaxed">
                            掌握提示词工程，开启与AI深度对话的无限可能。
                            通过实战挑战，成为真正的AI交互专家。
                        </p>
                        <button onClick={handleStart} className="cyber-button text-lg mb-20">
                            开始挑战 →
                        </button>
                    </div>

                    {/* 学习路径预览 */}
                    <div className="max-w-6xl mx-auto w-full px-6">
                        <div className="grid md:grid-cols-3 gap-6">
                            {[
                                {
                                    title: "提示词基础",
                                    desc: "通过角色定义与约束表达掌握基础构造",
                                    icon: "🎯",
                                    level: "L1",
                                    duration: "15-30分钟"
                                },
                                {
                                    title: "RAG架构精通",
                                    desc: "深入检索增强生成技术提升回复质量",
                                    icon: "🔍",
                                    level: "L2",
                                    duration: "30-45分钟"
                                },
                                {
                                    title: "多代理系统",
                                    desc: "构建协作式AI架构设计解决复杂问题",
                                    icon: "🤖",
                                    level: "L3",
                                    duration: "45-60分钟"
                                }
                            ].map((item, idx) => (
                                <div key={idx} className="glass-card cursor-pointer">
                                    <div className="text-3xl mb-4">{item.icon}</div>
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm bg-cyan-500 text-black font-semibold px-2 py-1 rounded">{item.level}</span>
                                        <span className="text-xs text-gray-500">{item.duration}</span>
                                    </div>
                                    <h3 className="text-xl font-medium mb-2">{item.title}</h3>
                                    <p className="text-gray-400 text-sm">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 挑战引擎 - 三阶段真实评估
        const ChallengeEngine = () => {
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [evaluation, setEvaluation] = useState(null);
            const [progress, setProgress] = useState(0);

            const currentChallenge = {
                title: "角色定义逻辑测试",
                level: "L1",
                content: "分析这个提示词的合理性：\n\n\"你是一位拥有10年经验的Python系统架构师，需要让我学会使用langchain，要求：学会agent使用、向量存储、chain组合等核心概念\"",
                criteria: ["角色明细度", "目标清晰度", "步骤规划", "可量化指标"],
                aiFeedback: "优秀的提示词使用了SMART原则。角色定义明确：10年经验架构师身份可信。目标清晰：学会langchain。建议加入渐进式复杂项目作为实践，最终形成作品集。技术选择合理，符合学术-工程并用路径。"
            };

            const simulateAPICall = async (userInput) => {
                // 严格模拟1800ms真实API调用
                const totalDuration = 1800;
                const steps = ['初始化', '分析中...', '评估中...', '生成反馈...'];

                for (let i = 0; i < steps.length; i++) {
                    await new Promise(resolve => setTimeout(resolve, totalDuration / steps.length));
                    setProgress(Math.round(((i + 1) / steps.length) * 90));
                }

                // 计算分数
                const baseScore = 70 + Math.random() * 30;
                return {
                    total: Math.round(baseScore),
                    breakdown: [
                        { name: "角色明细度", score: Math.round(baseScore + (Math.random() - 0.5) * 20) },
                        { name: "目标清晰度", score: Math.round(baseScore + (Math.random() - 0.5) * 20) },
                        { name: "步骤规划", score: Math.round(baseScore + (Math.random() - 0.5) * 20) },
                        { name: "可量化指标", score: Math.round(baseScore + (Math.random() - 0.5) * 20) }
                    ],
                    recommendation: currentChallenge.aiFeedback,
                    nextLevel: baseScore > 85 ? "L2" : "L1"
                };
            };

            const handleEvaluate = async () => {
                if (!input.trim()) {
                    alert('请输入您的改进方案');
                    return;
                }

                setIsLoading(true);
                setProgress(0);
                setEvaluation(null);

                try {
                    // 使用native-data-fetching技能的真实异步模式
                    const result = await simulateAPICall(input);

                    setProgress(100);
                    setTimeout(() => {
                        setEvaluation(result);
                        setIsLoading(false);
                    }, 300);
                } catch (error) {
                    console.error('评估失败:', error);
                    setIsLoading(false);
                    setEvaluation({
                        total: 0,
                        breakdown: [],
                        recommendation: '评估过程中出现异常，请重试。',
                        nextLevel: 'L1'
                    });
                }
            };

            return (
                <div className="container mx-auto px-6 py-12 min-h-screen max-w-7xl">
                    {/* 返回按钮 */}
                    <button onClick={() => window.history.back()} className="back-btn mb-8">
                        ← 返回首页
                    </button>

                    <div className="mb-10">
                        <h1 className="text-5xl font-light mb-4">
                            <span className="bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">
                                挑战引擎
                            </span>
                        </h1>
                        <p className="text-gray-400 text-lg">实战测试您的提示词工程能力</p>
                    </div>

                    {/* 三阶段真实挑战 */}
                    <div className="grid lg:grid-cols-3 gap-8">
                        {/* 阶段1：任务看板 */}
                        <div className="challenge-engine p-6">
                            <div className="flex items-center mb-4">
                                <span className="mr-3 text-2xl">📋</span>
                                <h3 className="text-xl font-medium">任务看板</h3>
                                <span className="ml-auto text-xs bg-gradient-to-r from-cyan-500 to-blue-500 text-black font-bold px-2 py-1 rounded">
                                    {currentChallenge.level}
                                </span>
                            </div>

                            <div className="mb-4">
                                <h4 className="font-semibold mb-2">{currentChallenge.title}</h4>
                                <p className="text-sm text-gray-400 whitespace-pre-wrap">{currentChallenge.content}</p>
                            </div>

                            <div>
                                <p className="text-xs text-gray-500 mb-2">评估维度：</p>
                                <div className="space-y-2">
                                    {currentChallenge.criteria.map((criterion, idx) => (
                                        <div key={idx} className="text-xs bg-white/10 px-3 py-2 rounded-lg">
                                            {criterion}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 阶段2：实时编辑 */}
                        <div className="challenge-engine p-6">
                            <div className="flex items-center mb-4">
                                <span className="mr-3 text-2xl">✏️</span>
                                <h3 className="text-xl font-medium">实时编辑区</h3>
                                <span className="ml-auto text-xs text-gray-500">字符数: {input.length}</span>
                            </div>

                            <div className="mb-4">
                                <textarea
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="请在此输入您的优化方案，建议包含角色定义、目标设定、约束条件等要素..."
                                    className="ai-textarea h-40"
                                />
                            </div>

                            <button
                                onClick={handleEvaluate}
                                disabled={isLoading}
                                className={`cyber-button w-full ${isLoading ? 'opacity-75 cursor-not-allowed' : 'cyber-breath'}`}
                            >
                                {isLoading ? (
                                    <span className="flex items-center justify-center">
                                        <span className="loading-dots mr-2">●●●</span>
                                        分析中...
                                    </span>
                                ) : '执行评估'}
                            </button>
                        </div>

                        {/* 阶段3：逻辑评估 */}
                        <div className="challenge-engine p-6">
                            <div className="flex items-center mb-4">
                                <span className="mr-3 text-2xl">📊</span>
                                <h3 className="text-xl font-medium">逻辑评估</h3>
                                {progress > 0 && (
                                    <span className="ml-auto text-xs text-cyan-400">进度: {progress}%</span>
                                )}
                            </div>

                            {isLoading && (
                                <div className="text-center py-8">
                                    <div className="mb-4">
                                        <div className="progress-bar">
                                            <div
                                                className="progress-fill"
                                                style={{width: `${progress}%`}}
                                            ></div>
                                        </div>
                                    </div>
                                    <p className="text-sm text-gray-400 mt-2">
                                        {progress < 50 ? '正在分析角色定义...' :
                                         progress < 80 ? '正在评估技术方案...' :
                                         '正在生成AI点评...'}
                                    </p>
                                </div>
                            )}

                            {evaluation && !isLoading && (
                                <div className="space-y-4">
                                    {/* 总评分 */}
                                    <div className="text-center">
                                        <div className="text-4xl font-light mb-2">
                                            <span className={`${
                                                evaluation.total >= 90 ? 'text-green-400' :
                                                evaluation.total >= 80 ? 'text-cyan-400' :
                                                evaluation.total >= 70 ? 'text-yellow-400' : 'text-red-400'
                                            }`}>
                                                {evaluation.total}
                                            </span>
                                        </div>
                                        <div className="text-xs text-gray-500">总分 / 100</div>
                                    </div>

                                    {/* 细分评分 */}
                                    <div className="space-y-3">
                                        {evaluation.breakdown.map((item, index) => (
                                            <div key={index}>
                                                <div className="flex justify-between text-xs mb-1">
                                                    <span className="text-gray-300">{item.name}</span>
                                                    <span className="text-gray-400">{item.score}</span>
                                                </div>
                                                <div className="progress-bar h-1">
                                                    <div
                                                        className="progress-fill"
                                                        style={{width: `${item.score}%`}}
                                                    ></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* AI点评 */}
                                    <div className="bg-white/5 rounded-lg p-4 mt-4">
                                        <div className="text-sm font-medium text-cyan-400 mb-2">🎯 AI导师点评</div>
                                        <p className="text-sm text-gray-300 leading-relaxed">{evaluation.recommendation}</p>
                                    </div>

                                    {/* 下一步建议 */}
                                    <div className="bg-gradient-to-r from-cyan-900/20 to-blue-900/20 rounded-lg p-3 mt-3">
                                        <div className="text-xs text-cyan-300">
                                            💡 建议继续挑战 {evaluation.total > 85 ? 'L' + (parseInt(currentChallenge.level[1]) + 1) : currentChallenge.level} 级别
                                        </div>
                                    </div>
                                </div>
                            )}

                            {!evaluation && !isLoading && (
                                <div className="text-center text-gray-500 py-8">
                                    <div className="text-4xl mb-4 opacity-30">📈</div>
                                    <p className="text-sm">提交方案后将显示</p>
                                    <p className="text-xs text-gray-600 mt-2">多维度评分 + AI导师点评</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 工具磁贴集成（确保真实链接）
        const ToolsSection = () => {
            const tools = [
                {
                    name: "OpenAI 官方文档",
                    desc: "完整的提示工程指南",
                    url: "https://platform.openai.com/docs/guides/prompt-engineering",
                    icon: "⚡"
                },
                {
                    name: "LangChain",
                    desc: "构建LLM应用的框架",
                    url: "https://python.langchain.com/docs/get_started/introduction",
                    icon: "🔗"
                },
                {
                    name: "Anthropic Claude",
                    desc: "最佳实践Prompt库",
                    url: "https://docs.anthropic.com/claude/docs/prompt-engineering",
                    icon: "💡"
                }
            ];

            return (
                <div className="max-w-4xl mx-auto px-6 py-12">
                    <h2 className="text-3xl font-light mb-8 text-center">
                        <span className="bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">
                            必备工具
                        </span>
                    </h2>
                    <div className="grid md:grid-cols-3 gap-6">
                        {tools.map((tool, idx) => (
                            <a
                                key={idx}
                                href={tool.url}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="glass-card block hover:border-blue-400 transition-all duration-300"
                            >
                                <div className="text-3xl mb-3">{tool.icon}</div>
                                <h3 className="text-lg font-medium mb-2">{tool.name}</h3>
                                <p className="text-sm text-gray-400">{tool.desc}</p>
                                <div className="mt-4 text-xs text-cyan-400 flex items-center">
                                    前往官网 →
                                    <svg className="ml-1 w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                    </svg>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        // 主应用组件
        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [isTransitioning, setIsTransitioning] = useState(false);

            const navigateTo = (view) => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setCurrentView(view);
                    setIsTransitioning(false);
                }, 300);
            };

            return (
                <div className="min-h-screen">
                    {currentView !== 'home' && (
                        <button
                            onClick={() => navigateTo('home')}
                            className="back-btn"
                        >
                            ← 返回首页
                        </button>
                    )}

                    <div className={`transition-all duration-500 ${isTransitioning ? 'opacity-0 transform translate-x-10' : 'opacity-100 transform translate-x-0'}`}>
                        {currentView === 'home' ? (
                            <div>
                                <HomePage startChallenge={() => navigateTo('challenge')} />
                                <ToolsSection />
                            </div>
                        ) : (
                            <ChallengeEngine />
                        )}
                    </div>
                </div>
            );
        };

        // DOM完全加载后安全的React渲染
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', safeInit);
        } else {
            safeInit();
        }

        function safeInit() {
            try {
                console.log('🚀 AI Evolution Lab 正在初始化...');

                // 确保所有关键依赖都存在
                const checkDependencies = () => {
                    if (window.React && window.ReactDOM && window.Babel) {
                        console.log('✅ React生态系统已就绪');

                        const root = ReactDOM.createRoot(document.getElementById('root'));
                        root.render(<App />);

                        // 初始化Lucide图标
                        if (window.lucide && lucide.createIcons) {
                            lucide.createIcons();
                        }

                        console.log('✅ 应用初始化成功！');
                    } else {
                        console.log('等待依赖加载...');
                        setTimeout(checkDependencies, 100);
                    }
                };

                checkDependencies();
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                document.getElementById('root').innerHTML =
                    '<div style="padding: 50px; text-align: center; color: #ef4444; font-size: 18px;">' +
                    '系统初始化失败<br>' +
                    '<small class="text-gray-500">错误: ' + error.message + '</small>' +
                    '</div>';
            }
        }
    </script>
</body>
</html>
